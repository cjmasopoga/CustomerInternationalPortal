# ─────────────────────────────────────────────────────────────
#  SonarCloud — Employee International Payments Portal
#  https://sonarcloud.io
#
#  These properties are used by the sonar-scanner CLI.
#  The sonar.login token is supplied via the SONAR_TOKEN
#  environment variable in CircleCI (never hardcode it here).
# ─────────────────────────────────────────────────────────────

# Project identification
sonar.projectKey=cjmasopoga_CustomerInternationalPortal
sonar.projectName=Employee International Payments Portal
sonar.projectVersion=1.0

# SonarCloud organisation (matches your GitHub username/org)
sonar.organization=cjmasopoga

# Source directory — only scan the React/TypeScript frontend
sonar.sources=frontend/src

# File encoding
sonar.sourceEncoding=UTF-8

# Language
sonar.language=ts

# Exclusions — skip generated files, build output and test stubs
sonar.exclusions=\
  **/node_modules/**, \
  **/dist/**, \
  **/build/**, \
  **/*.test.ts, \
  **/*.test.tsx, \
  **/*.spec.ts, \
  **/*.spec.tsx, \
  **/vite-env.d.ts

# TypeScript — point to the app tsconfig
sonar.typescript.tsconfigPath=frontend/tsconfig.app.json

# Coverage report (optional — add if you introduce Jest)
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Quality Gate — fail the pipeline if the gate is not met
sonar.qualitygate.wait=true
